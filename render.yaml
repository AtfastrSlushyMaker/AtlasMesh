services:
  - type: web
    name: atlasmesh
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENSKY_USERNAME
        sync: false
      - key: OPENSKY_PASSWORD
        sync: false
      - key: AISSTREAM_TOKEN
        sync: false
    healthCheckPath: /health
    plan: starter
